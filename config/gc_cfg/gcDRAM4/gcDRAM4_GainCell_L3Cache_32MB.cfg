-DesignTarget: cache

-CacheAccessMode: Normal
-Associativity (for cache only): 16

-ProcessNode: 14

// mostly used to calculate resistances and capacitances
-ProcessNodeCell: 60
-ProcessNodeCell1: 60
-ProcessNodeCell2: 60

-Capacity (MB): 32
-WordWidth (bit): 512

-DeviceRoadmap: LOP

-LocalWireType: LocalAggressive
-LocalWireRepeaterType: RepeatedOpt
-LocalWireUseLowSwing: No

-GlobalWireType: GlobalAggressive
-GlobalWireRepeaterType: RepeatedOpt
