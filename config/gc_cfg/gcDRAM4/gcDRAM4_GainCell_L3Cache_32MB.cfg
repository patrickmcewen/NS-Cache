-Routing: H-tree

-InternalSensing: true

-MemoryCellInputFile: config/gc_cfg/cells/gcDRAM4.cell

-PeripheralUnderArrayMat: true

-Temperature (K): 300

-OptimizationTarget: FullExploration
-EnablePruning: No
-NSWiring: true
//-ForceBankA (Total AxB): 4x4
//-ViewQuantization: true

-BufferDesignOptimization: latency

-StackedDieCount: 1
-PartitionGranularity: 0
-LocalTSVProjection: 0
-GlobalTSVProjection: 0
-TSVRedundancy: 1.0

